version: "3.9"

# ============================================================================
# 6G-DALI / OpenOP Hackfest — Participant EDC
# ============================================================================
# Each participant runs this on their laptop. It provides:
#   - Their own EDC connector (provider + consumer in one)
#   - A local RustFS for dataset storage
#   - A PostgreSQL for EDC state
#
# Configure via participant/.env (copied from .env.template) — compose loads it
# automatically. In particular set MY_HOST to your machine's LAN IP (the address
# other connectors use to reach yours; do not use localhost) and PARTICIPANT_NAME
# to your team name. Then:
#
#   cp .env.template .env   # then edit .env
#   docker compose up -d
#
# (Shell exports of MY_HOST / PARTICIPANT_NAME still override the .env if set.)
#
# Catalog UI:  http://localhost:21000/api/catalog
# Management:  http://localhost:21001/management/v3/...
# RustFS UI:   http://localhost:21005  (participant-admin / participant-secret-2024)
# Airflow UI:  http://localhost:21006  (airflow / airflow)
# ============================================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edc_participant
      POSTGRES_USER: edc_user
      POSTGRES_PASSWORD: edc_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edc_user -d edc_participant"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── RustFS (S3-compatible dataset storage) ─────────────────────────────────
  rustfs:
    image: rustfs/rustfs:latest
    command: server /data --console-address ":9001" --address ":9000"
    environment:
      RUSTFS_ROOT_USER: participant-admin
      RUSTFS_ROOT_PASSWORD: participant-secret-2024
    ports:
      - "21004:9000"   # S3 API
      - "21005:9001"   # Console UI
    volumes:
      - rustfsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ── RustFS bootstrap (create buckets) ─────────────────────────────────────
  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: participant-admin
      AWS_SECRET_ACCESS_KEY: participant-secret-2024
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://rustfs:9000 s3 mb s3://my-datasets 2>/dev/null || true &&
        aws --endpoint-url http://rustfs:9000 s3 mb s3://received 2>/dev/null || true &&
        aws --endpoint-url http://rustfs:9000 s3 mb s3://dataops 2>/dev/null || true &&
        echo 'Buckets ready: my-datasets, received, dataops'
      "

  # ── Participant EDC Connector ─────────────────────────────────────────────
  edc:
    image: ghcr.io/sparkworksnet/6gdali-testbed-connector:latest
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - "21000:21000"   # Default / Catalog UI
      - "21001:21001"   # Management API
      - "21002:21002"   # DSP Protocol
      - "21003:21003"   # Control
    environment:
      # Database
      EDC_DATASOURCE_DEFAULT_URL: jdbc:postgresql://postgres:5432/edc_participant
      EDC_DATASOURCE_DEFAULT_USER: edc_user
      EDC_DATASOURCE_DEFAULT_PASSWORD: edc_password
      EDC_SQL_SCHEMA_AUTOCREATE: "true"
      # Connector identity
      EDC_PARTICIPANT_ID: ${PARTICIPANT_NAME:-participant}
      EDC_IDS_ID: "urn:connector:${PARTICIPANT_NAME:-participant}"
      # Web ports
      WEB_HTTP_PORT: 21000
      WEB_HTTP_PATH: /api
      WEB_HTTP_MANAGEMENT_PORT: 21001
      WEB_HTTP_MANAGEMENT_PATH: /management
      WEB_HTTP_PROTOCOL_PORT: 21002
      WEB_HTTP_PROTOCOL_PATH: /protocol
      WEB_HTTP_CONTROL_PORT: 21003
      WEB_HTTP_CONTROL_PATH: /control
      # DSP callback — the address this connector advertises to counterparties,
      # so other participants (and the central EDC) can reach it for negotiation
      # and transfer. Must be this machine's LAN IP, not the internal "edc"
      # service name or localhost. Set MY_HOST before `docker compose up`.
      EDC_DSP_CALLBACK_ADDRESS: http://${MY_HOST:-localhost}:21002/protocol
      # CORS
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_ORIGINS: "*"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,authorization,x-api-key"
      # Transfer
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_DATAPLANE_HTTP_SINK_PARTITION_SIZE: 1

  # ── Airflow (lightweight, standalone) ──────────────────────────────────────
  # A single-container Airflow for authoring/triggering DataOps DAGs locally.
  # Runs in `standalone` mode (its own SQLite metadata DB + SequentialExecutor,
  # auto-creates the admin user) — no separate Postgres/Redis/Celery workers,
  # unlike the full multi-container DataOps stack. Fine for a hackfest laptop;
  # not meant for anything beyond a handful of manually-triggered DAGs.
  #
  # dags/ starts empty — write your own DAGs here during the hackfest. They
  # can call into your EDC connector (http://edc:21001 management,
  # http://edc:21002/protocol) and RustFS (http://rustfs:9000) using the same
  # service names/ports as the scripts in ../scripts.
  airflow:
    image: ghcr.io/6g-dali/airflow-base:3.1.8
    # Pin the airflow/airflow login by (re)writing SimpleAuthManager's password
    # file on every start. We write it into the /opt/airflow named volume so it's
    # owned by the in-container airflow user (uid 50000) and SimpleAuthManager can
    # rewrite it at runtime. Writing unconditionally resets the login to
    # airflow/airflow on each restart.
    command:
      - bash
      - -c
      - |
        echo '{"airflow": "airflow"}' > /opt/airflow/simple_auth_manager_passwords.json.generated
        exec /entrypoint standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Airflow 3's Simple Auth Manager (not FAB) drives standalone-mode
      # login; _AIRFLOW_WWW_USER_* env vars are a no-op here. Declaring the
      # "airflow" user with the admin role, plus pre-seeding its password
      # file below, pins the login to a fixed airflow/airflow instead of
      # the random one it'd otherwise generate for a default "admin" user.
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "airflow:admin"
      # Without this, dali.datalake.PARTICIPANT_ID always falls back to the
      # literal "participant" — silently diverging from the edc service's
      # own EDC_PARTICIPANT_ID above whenever a team sets a custom
      # PARTICIPANT_NAME, as this file's own header instructs them to.
      PARTICIPANT_NAME: ${PARTICIPANT_NAME:-participant}
    ports:
      - "21006:8080"   # Airflow UI / REST API
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - participant-airflow-data:/opt/airflow
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
  rustfsdata:
  participant-airflow-data:
