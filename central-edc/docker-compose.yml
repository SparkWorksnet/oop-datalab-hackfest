version: "3.9"

# ============================================================================
# 6G-DALI / OpenOP Hackfest — Central EDC
# ============================================================================
# This runs once at the hackfest venue. It hosts the shared catalogue with
# sample datasets that participants will pull from their own connectors.
#
# Start:  docker compose up -d
# UI:     http://<HOST>:20000/api/catalog
# Mgmt:   http://<HOST>:20001/management/v3/...
# DSP:    http://<HOST>:20002/protocol
# RustFS: http://<HOST>:9001   (central-admin / central-secret-2024)
# Airflow:http://<HOST>:20006  (airflow / airflow)
# ============================================================================

services:

  # ── PostgreSQL for EDC persistence ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: edc_provider
      POSTGRES_USER: edc_user
      POSTGRES_PASSWORD: edc_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edc_user -d edc_provider"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── RustFS (S3-compatible dataset storage) ────────────────────────────────
  rustfs:
    image: rustfs/rustfs:latest
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: server /data --console-address ":9001" --address ":9000"
    environment:
      RUSTFS_ROOT_USER: central-admin
      RUSTFS_ROOT_PASSWORD: central-secret-2024
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console UI
    volumes:
      - rustfsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ── RustFS bootstrap (create bucket + upload sample data) ─────────────────
  rustfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: central-admin
      AWS_SECRET_ACCESS_KEY: central-secret-2024
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://rustfs:9000 s3 mb s3://central-datasets 2>/dev/null || true &&
        aws --endpoint-url http://rustfs:9000 s3 mb s3://dataops 2>/dev/null || true &&
        aws --endpoint-url http://rustfs:9000 s3 mb s3://my-datasets 2>/dev/null || true &&
        echo 'Buckets ready: central-datasets, dataops, my-datasets';
        if [ -d /seed-data ] && [ \"$$(ls -A /seed-data 2>/dev/null)\" ]; then
          aws --endpoint-url http://rustfs:9000 s3 cp --recursive /seed-data/ s3://central-datasets/ &&
          echo 'Seed data uploaded.';
        fi
      "
    volumes:
      - ./seed-data:/seed-data:ro

  # ── Central EDC Connector ─────────────────────────────────────────────────
  edc-central:
    image: ghcr.io/sparkworksnet/6gdali-testbed-connector:latest
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - "20000:20000"   # Default / Catalog UI
      - "20001:20001"   # Management API
      - "20002:20002"   # DSP Protocol
      - "20003:20003"   # Control
    environment:
      # Database
      EDC_DATASOURCE_DEFAULT_URL: jdbc:postgresql://postgres:5432/edc_provider
      EDC_DATASOURCE_DEFAULT_USER: edc_user
      EDC_DATASOURCE_DEFAULT_PASSWORD: edc_password
      EDC_SQL_SCHEMA_AUTOCREATE: "true"
      # Connector identity
      EDC_PARTICIPANT_ID: hackfest-central
      EDC_IDS_ID: "urn:connector:hackfest-central"
      # Web ports
      WEB_HTTP_PORT: 20000
      WEB_HTTP_PATH: /api
      WEB_HTTP_MANAGEMENT_PORT: 20001
      WEB_HTTP_MANAGEMENT_PATH: /management
      WEB_HTTP_PROTOCOL_PORT: 20002
      WEB_HTTP_PROTOCOL_PATH: /protocol
      WEB_HTTP_CONTROL_PORT: 20003
      WEB_HTTP_CONTROL_PATH: /control
      # DSP callback — participants reach this connector via the host IP
      EDC_DSP_CALLBACK_ADDRESS: http://edc-central:20002/protocol
      # CORS
      EDC_WEB_REST_CORS_ENABLED: "true"
      EDC_WEB_REST_CORS_ORIGINS: "*"
      EDC_WEB_REST_CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
      EDC_WEB_REST_CORS_HEADERS: "origin,content-type,accept,authorization,x-api-key"
      # Transfer
      EDC_TRANSFER_PROXY_TOKEN_SIGNER_PRIVATEKEY_ALIAS: private-key
      EDC_TRANSFER_PROXY_TOKEN_VERIFIER_PUBLICKEY_ALIAS: public-key
      EDC_DATAPLANE_HTTP_SINK_PARTITION_SIZE: 1

  # ── Airflow (lightweight, standalone) ──────────────────────────────────────
  # The central counterpart to the participant stack's Airflow. It runs the
  # SAME DataOps DAGs and the same `dali` plugin library — the dags/ and plugins/
  # directories are bind-mounted straight from ../participant/airflow, so there
  # is a single source of truth shared by both stacks. The env vars below are the
  # only difference: they retarget the env-driven `dali` library (see
  # participant/airflow/plugins/dali/datalake.py) at THIS host's central tools —
  # the central EDC connector (edc-central:20001 / :20002) and the central RustFS
  # (rustfs:9000, central-admin creds) — instead of a participant's.
  #
  # Runs in `standalone` mode (own SQLite metadata DB + SequentialExecutor,
  # auto-creates the admin user); see the participant compose for details.
  airflow:
    image: ghcr.io/6g-dali/airflow-base:3.1.8
    depends_on:
      rustfs:
        condition: service_healthy
      edc-central:
        condition: service_started
    # Pin the airflow/airflow login by (re)writing SimpleAuthManager's password
    # file on every start (into the named volume owned by the in-container
    # airflow user, uid 50000), same as the participant stack.
    command:
      - bash
      - -c
      - |
        echo '{"airflow": "airflow"}' > /opt/airflow/simple_auth_manager_passwords.json.generated
        exec /entrypoint standalone
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "airflow:admin"
      # ── Retarget the shared `dali` library at the central tools ────────────
      EDC_MGMT_URL: http://edc-central:20001
      EDC_PROTOCOL_URL: http://edc-central:20002/protocol
      PARTICIPANT_ID: hackfest-central
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS: central-admin
      S3_SECRET: central-secret-2024
      DEST_BUCKET: dataops
    ports:
      - "20006:8080"   # Airflow UI / REST API
    volumes:
      # Shared with the participant stack — single source of truth for DAGs + libs
      - ../participant/airflow/dags:/opt/airflow/dags
      - ../participant/airflow/plugins:/opt/airflow/plugins
      - central-airflow-data:/opt/airflow
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  pgdata:
  rustfsdata:
  central-airflow-data:
